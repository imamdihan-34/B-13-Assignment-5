<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Github Issue Tracker</title>

<link rel="shortcut icon" href="./assets/github-logo.png">
<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>
<body class="min-h-screen flex items-center justify-center ">

  <div class="w-[420px] bg-white p-8 rounded-xl shadow-lg">
      <div class="flex justify-center mb-4">
    <div class=" rounded-full">
        <img  src="./assets/github-logo.png">
    </div>
        </div>


   <h2 class="text-2xl font-bold text-center">GitHub Issues Tracker</h2>
      <p class="text-center text-gray-500 text-sm mb-6">
        Sign in to manage your issues
      </p>


<div class="space-y-4">
     <div>
    <label class="font-semibold text-sm">Username</label>
    <input id="input-name" type="text" placeholder="Enter name"
        class="input input-bordered w-full rounded-full bg-gray-100"/>
      </div>

      <div>
    <label class="font-semibold text-sm">Password</label>
      <input id="input-password"type="password" placeholder="Enter password"
      class="input input-bordered w-full rounded-full bg-gray-100"/>
      </div>

    <button
id="login-btn"
class="w-full py-2 rounded-full text-white font-semibold
bg-gradient-to-r from-purple-600 to-indigo-600
hover:opacity-90"
>
Sign In
</button>

</div>
</div>
  <script src="./login.js"></script>
  <script src="./script.js"></script>
</body>
</html>
