<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Issues Section</title>

<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

</head>

<body class="max-w-7xl mx-auto">

<!-- NAVBAR -->

<div class="flex justify-between items-center bg-base-200 p-4">

<div class="flex items-center gap-2">
<img src="./assets/github-logo.png" class="w-8">
<h2 class="text-2xl font-bold">Github Issue Tracker</h2>
</div>

<div class="flex gap-2">

<input id="searchInput" type="text"
placeholder="Search issues"
class="input input-bordered"/>

<button class="btn btn-primary">+ New Issue</button>

</div>

</div>

<!-- TABS -->


<div class="flex gap-3 my-6">

<button id="allBtn" class="btn btn-primary">All</button>
<button id="openBtn" class="btn">Open</button>
<button id="closedBtn" class="btn">Closed</button>

</div>
   <div class="mx-5 my-8">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                    <div class="flex items-center gap-4">
                        <div class="bg-indigo-50 text-indigo-600 p-4 rounded-2xl">
                            <img src="./assets/Aperture.png" alt="">
                        </div>
                        <div>
                            <h2 class="font-black text-2xl text-slate-800"><span id="issue-count">50</span> Issues</h2>
                            <p class=" text-slate-400">Track and manage your project issues</p>
                        </div>
                    </div>
                    <div class="flex gap-6 text-xs font-bold uppercase tracking-wider">
                        <span class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-emerald-500"></span> Open</span>
                        <span class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-purple-500"></span> Closed</span>
                    </div>
                </div>
   </div>
<!-- SPINNER -->

<div id="loader" class="flex justify-center my-10 hidden">
<span class="loading loading-spinner loading-lg"></span>
</div>

<!-- ISSUE CARDS -->

<div id="issues-container"
class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5">
</div>

<script src="./script.js"></script>

</body>
</html>
